name: DTAP Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_DIR: com.nhlstenden.JabberPoint
  JUNIT_VERSION: 1.14.4
  CHECKSTYLE_VERSION: 10.21.1

jobs:

  development:
    name: Development - Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile source
        run: |
          mkdir -p out/classes
          find ${{ env.PROJECT_DIR }}/src -name "*.java" > sources.txt
          javac -d out/classes @sources.txt

      - name: Copy resources onto classpath
        run: cp -r ${{ env.PROJECT_DIR }}/src/resources out/classes/

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: development-build
          path: out/classes

  testing:
    name: Testing - Run Unit Tests
    runs-on: ubuntu-latest
    needs: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: development-build
          path: out/classes

      - name: Download JUnit console launcher
        run: |
          curl -L -o junit-console.jar \
          https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/${{ env.JUNIT_VERSION }}/junit-platform-console-standalone-${{ env.JUNIT_VERSION }}.jar

      - name: Compile tests
        run: |
          mkdir -p out/test-classes
          find ${{ env.PROJECT_DIR }}/test -name "*.java" > test-sources.txt
          javac -cp "out/classes:junit-console.jar" -d out/test-classes @test-sources.txt

      - name: Run tests
        run: |
          java -Djava.awt.headless=true -jar junit-console.jar execute \
          --class-path "out/classes:out/test-classes" \
          --scan-classpath \
          --reports-dir=test-reports \
          --fail-if-no-tests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports

  acceptance:
    name: Acceptance - Code Quality Check
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download Checkstyle
        run: |
          curl -L -o checkstyle.jar \
          https://github.com/checkstyle/checkstyle/releases/download/checkstyle-${{ env.CHECKSTYLE_VERSION }}/checkstyle-${{ env.CHECKSTYLE_VERSION }}-all.jar

      - name: Run Checkstyle
        continue-on-error: true
        run: |
          find ${{ env.PROJECT_DIR }}/src -name "*.java" > checkstyle-sources.txt
          java -jar checkstyle.jar -c /sun_checks.xml @checkstyle-sources.txt -f xml -o checkstyle-report.xml

      - name: Upload code quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: checkstyle-report.xml

  production:
    name: Production - Package Executable
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: development-build
          path: out/classes

      - name: Build executable JAR
        run: |
          mkdir -p out/dist
          jar --create --file out/dist/JabberPoint.jar --main-class jabberpoint.JabberPoint -C out/classes .

      - name: Upload executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: out/dist/JabberPoint.jar
